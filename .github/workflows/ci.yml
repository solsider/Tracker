name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  backend-unit:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:unit:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-coverage
          path: backend/coverage/unit

  backend-integration:
    name: Backend — Integration Tests (e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracker_test?schema=public
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      JWT_EXPIRES_IN: 7d

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Apply DB schema
        run: npx prisma generate && npx prisma db push --accept-data-loss
      - name: Run integration tests
        run: npm run test:e2e

  backend-build:
    name: Backend — Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  frontend-unit:
    name: Frontend — Unit & Component Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage

  frontend-build:
    name: Frontend — Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─── Security Audit ──────────────────────────────────────────────────────────

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit backend
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true
      - name: Audit frontend
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Docker Build ─────────────────────────────────────────────────────────────

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: tracker-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: tracker-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Playwright E2E ───────────────────────────────────────────────────────────

  e2e-playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-integration, frontend-build]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tracker
          POSTGRES_USER: tracker_user
          POSTGRES_PASSWORD: tracker_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tracker_user:tracker_pass@localhost:5432/tracker?schema=public
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Prepare DB
        run: npx prisma generate && npx prisma db push --accept-data-loss
        working-directory: backend

      - name: Start backend
        run: nohup npm run start:prod > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Build and serve frontend
        run: |
          npm run build
          nohup npm run preview -- --port 5173 --host > /tmp/frontend.log 2>&1 &
        working-directory: frontend

      - name: Wait for services
        run: npx wait-on http://localhost:3001/health http://localhost:5173 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─── k6 Smoke Test ───────────────────────────────────────────────────────────

  k6-smoke:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-integration]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tracker
          POSTGRES_USER: tracker_user
          POSTGRES_PASSWORD: tracker_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tracker_user:tracker_pass@localhost:5432/tracker?schema=public
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      NODE_ENV: development
      PORT: 3001

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: grafana/setup-k6-action@v1
      - name: Install backend deps and prepare DB
        run: |
          npm ci
          npx prisma generate
          npx prisma db push --accept-data-loss
        working-directory: backend
      - name: Start backend
        run: nohup npm run start:prod > /tmp/backend.log 2>&1 &
        working-directory: backend
      - name: Wait for backend
        run: npx wait-on http://localhost:3001/health --timeout 60000
      - name: Run k6 smoke test
        run: k6 run load-tests/k6/smoke.js
        env:
          BASE_URL: http://localhost:3001

  # ─── Gate ────────────────────────────────────────────────────────────────────

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-unit
      - backend-integration
      - backend-build
      - frontend-lint
      - frontend-unit
      - frontend-build
      - security-audit
      - docker-build
      - e2e-playwright
      - k6-smoke
    if: always()
    steps:
      - name: Check required jobs
        run: |
          for job in backend-lint backend-unit backend-integration backend-build frontend-lint frontend-unit frontend-build docker-build k6-smoke; do
            result=$(echo '${{ toJson(needs) }}' | jq -r ".[\"$job\"].result")
            if [ "$result" != "success" ]; then
              echo "Job $job failed with result: $result"
              exit 1
            fi
          done
          echo "All required checks passed."
